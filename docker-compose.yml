services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '8000:80'
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - '3001:3001'
      - '8081:3001'
    env_file:
      - ./apps/server/.env
    environment:
      - PORT=3001
      # Docker 内 livekit 通过服务名访问；浏览器仍在宿主机用 localhost:7880
      - LIVEKIT_WS_URL=ws://localhost:7880

  # 本地代码执行沙箱
  sandbox:
    build:
      context: ./sandbox
    ports:
      - '3002:3002'
    volumes:
      - sandbox_data:/workspace
    restart: unless-stopped

  # LiveKit WebRTC SFU 服务器 — 语音/视频通话信令与媒体转发
  # 注意：需要先 docker compose up livekit -d 启动，否则报 127.0.0.1:7880 拒绝连接
  livekit:
    image: livekit/livekit-server:latest
    ports:
      - '7880:7880'     # WebSocket 信令
      - '7881:7881'     # gRPC
      - '7882:7882'     # HTTP
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml --node-ip=127.0.0.1
    restart: unless-stopped

volumes:
  sandbox_data:
